<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
  <!-- Sun rays -->
  <g transform="translate(100,85)">
    <polygon points="0,-80 8,-30 -8,-30" fill="#FFD700"/>
    <polygon points="0,-80 8,-30 -8,-30" fill="#FFD700" transform="rotate(20)"/>
    <polygon points="0,-80 8,-30 -8,-30" fill="#FFD700" transform="rotate(40)"/>
    <polygon points="0,-80 8,-30 -8,-30" fill="#FFD700" transform="rotate(60)"/>
    <polygon points="0,-80 8,-30 -8,-30" fill="#FFD700" transform="rotate(80)"/>
    <polygon points="0,-80 8,-30 -8,-30" fill="#FFD700" transform="rotate(100)"/>
    <polygon points="0,-80 8,-30 -8,-30" fill="#FFD700" transform="rotate(120)"/>
    <polygon points="0,-80 8,-30 -8,-30" fill="#FFD700" transform="rotate(140)"/>
    <polygon points="0,-80 8,-30 -8,-30" fill="#FFD700" transform="rotate(160)"/>
    <polygon points="0,-80 8,-30 -8,-30" fill="#FFD700" transform="rotate(180)"/>
    <polygon points="0,-80 8,-30 -8,-30" fill="#FFD700" transform="rotate(200)"/>
    <polygon points="0,-80 8,-30 -8,-30" fill="#FFD700" transform="rotate(220)"/>
    <polygon points="0,-80 8,-30 -8,-30" fill="#FFD700" transform="rotate(240)"/>
    <polygon points="0,-80 8,-30 -8,-30" fill="#FFD700" transform="rotate(260)"/>
    <polygon points="0,-80 8,-30 -8,-30" fill="#FFD700" transform="rotate(280)"/>
    <polygon points="0,-80 8,-30 -8,-30" fill="#FFD700" transform="rotate(300)"/>
    <polygon points="0,-80 8,-30 -8,-30" fill="#FFD700" transform="rotate(320)"/>
    <polygon points="0,-80 8,-30 -8,-30" fill="#FFD700" transform="rotate(340)"/>
  </g>
  <!-- Blue dome -->
  <path d="M 40,120 A 60,60 0 0,1 160,120 Z" fill="#2E86C1"/>
  <!-- Green house / HQ shape -->
  <polygon points="100,95 55,130 65,130 65,165 135,165 135,130 145,130" fill="#1B8A2A"/>
  <!-- HQ text -->
  <text x="100" y="152" text-anchor="middle" font-family="Arial,sans-serif" font-size="28" font-weight="bold" fill="white">HQ</text>
  <!-- POWER text -->
  <text x="100" y="185" text-anchor="middle" font-family="Arial,sans-serif" font-size="18" font-weight="bold" fill="#1B8A2A" letter-spacing="3">POWER</text>
</svg>
